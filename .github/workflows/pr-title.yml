name: PR Title

# release-please derives the next version + CHANGELOG from Conventional Commits.
# With squash-merge, the squash commit is the PR title, so lint the title.
on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint:
    name: conventional title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed types (keep in sync with release-please changelog-sections).
          types: |
            feat
            fix
            perf
            docs
            refactor
            test
            build
            ci
            chore
            revert
